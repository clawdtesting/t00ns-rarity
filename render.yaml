services:
  - type: web
    name: t00ns-rarity
    runtime: node
    plan: free

    buildCommand: npm install
    startCommand: npm start

    healthCheckPath: /health
    autoDeployTrigger: commit

    envVars:
      - key: OPENSEA_API_KEY
        sync: false

      - key: OPENSEA_COLLECTION_SLUG
        value: just-t00ns-ethereum

      - key: DEFAULT_LIMIT
        value: "25"

      - key: LIVE_CACHE_SECONDS
        value: "30"
